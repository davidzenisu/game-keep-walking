name: game_keep_walking
description: A Flutter game app with Material 3 design, optimized for Android Play Store publication via Fastlane.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '3.44.2'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^8.1.0
  health: ^13.3.1
  permission_handler: ^12.0.3
  carp_serializable: ^2.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
